name: Daily Automated Commit

permissions:
  contents: write

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Step for 24f1002074@ds.study.iitm.ac.in
        run: echo "Running automated update"

      - name: Make daily change
        run: |
          echo "Last updated on $(date)" >> daily-log.txt

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "24f1002074@ds.study.iitm.ac.in"
          git add daily-log.txt
          git commit -m "Automated daily commit $(date)" || echo "No changes"
          git push
